version: 1
title: Order Sequence
diagram: ./order-sequence.mmd

steps:
  - focus:
      - customer
    text: >
      The {{customer}} is the human entry point for the exchange.

  - focus:
      - submit_order
    text: >
      {{submit_order}} captures the initial request crossing into {{api}}.

  - focus:
      - enqueue_order
    text: >
      {{enqueue_order}} hands the accepted work to {{queue}} for downstream processing.
