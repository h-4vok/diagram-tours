version: 1
title: Huge System Stress Test
diagram: ./ops-huge-system.mmd

steps:
  - focus:
      - edge
    text: >
      Start at {{edge}} near the top of the stress diagram to verify that first-load centering,
      highlight, and dimming stay stable even with a very large SVG.

  - focus:
      - auth
      - limits
      - router
    text: >
      The intake path from {{auth}} through {{limits}} into {{router}} is intentionally dense so we
      can inspect labeled edges like HTTP, validate token, and check limits without losing clarity.

  - focus:
      - order
      - payment
      - stock
    text: >
      The main transactional fan-out from {{order}} into {{payment}} and {{stock}} stresses
      multi-focus behavior across several adjacent services and overlapping labeled routes.

  - focus:
      - risk
      - fraud
      - payment
    text: >
      This group combines {{risk}}, {{fraud}}, and {{payment}} to stress highlight behavior across
      cross-links, feedback loops, and the risk scoring path.

  - focus:
      - event_bus
      - notify
      - analytics
      - audit
    text: >
      The event fan-out around {{event_bus}}, {{notify}}, {{analytics}}, and {{audit}} is here to
      expose label density, branching, and dimming resilience in the busiest middle section.

  - focus:
      - email
      - push
      - compliance
    text: >
      This intentionally distant focus spans {{email}}, {{push}}, and {{compliance}} so we can
      watch how the viewport handles multi-focus groups that are far apart.

  - focus: []
    text: >
      Empty focus should return the player to a neutral state without leaving stale highlight or bad
      viewport coordinates behind.

  - focus:
      - reconcile
      - ops
      - dlq
    text: >
      Finish near the bottom with {{reconcile}}, {{ops}}, and {{dlq}} to validate deep links,
      large-diagram rendering, and far-side recentering under heavy complexity.
