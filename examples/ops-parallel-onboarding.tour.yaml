version: 1
title: Parallel Onboarding
diagram: ./ops-parallel-onboarding.mmd

steps:
  - focus:
      - kickoff
    text: >
      {{kickoff}} is the moment a new hire is officially accepted into the onboarding pipeline. It is less about a meeting and more about establishing a shared start date that downstream teams can plan against.

  - focus:
      - profile
      - access
      - training
    text: >
      After kickoff, {{profile}}, {{access}}, and {{training}} run in parallel because waiting for each one sequentially would create avoidable delay. This is a common operations pattern: independent readiness tasks should overlap whenever risk is low.

  - focus:
      - ready
    text: >
      {{ready}} is the business checkpoint for day-one productivity. It means the person can log in, has the required profile and permissions, and is not blocked on basic orientation.
